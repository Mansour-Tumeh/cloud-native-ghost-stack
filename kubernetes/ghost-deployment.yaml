apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: ghost
  template:
    metadata:
      labels:
        app: ghost
    spec:
      containers:
      - name: ghost
        image: ghost:5-alpine
        env:
        - name: url
          value: https://blog.dl4it.com
        # MySQL Configuration
        - name: database__client
          value: mysql
        - name: database__connection__host
          value: mysql 
        - name: database__connection__user
          value: root
        - name: database__connection__password
          valueFrom:
            secretKeyRef:
              name: ghost-db-secrets
              key: mysql-root-password
        - name: database__connection__database
          value: ghost
        ports:
        - containerPort: 2368
        volumeMounts:
        - name: ghost-content
          mountPath: /var/lib/ghost/content
      volumes:
      - name: ghost-content
        persistentVolumeClaim:
          claimName: ghost-content-pvc

env:
  - name: database__client
    value: "mysql"
  - name: database__connection__host
    value: "mysql" 
  - name: database__connection__user
    value: "ghost"
  - name: database__connection__password
    valueFrom:
      secretKeyRef:
        name: ghost-db-secrets
        key: mysql-password
  - name: database__connection__database
    value: "ghost"

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ghost-ingress
  annotations:
    kubernetes.io/ingress.class: "traefik" 
spec:
  rules:
  - host: blog.dl4it.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ghost 
            port:
              number: 2368
name: Cloud-Native Stack Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  terraform-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: HashiCorp Setup
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Validate
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: ./terraform

 
  deploy:
    needs: terraform-check
    runs-on: self-hosted  
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate and Apply Secrets
        run: |
          # Pointing to the local K3s config
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          
          # Dynamically create the secret from GitHub Action Secrets
          kubectl create secret generic ghost-db-secrets \
            --from-literal=mysql-root-password='${{ secrets.MYSQL_ROOT_PASSWORD }}' \
            --from-literal=mysql-password='${{ secrets.MYSQL_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Manifests
        run: |
          # Pointing to the local K3s config
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          
          # Apply all manifests in the kubernetes directory
          kubectl apply -f kubernetes/